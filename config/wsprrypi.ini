; Edit the values below as needed. Do not remove sections or keys.

[Control]
; Transmit:
; Set to True to enable transmitting, False to disable.
Transmit = False


[Common]
; Call Sign:
; Legacy compatibility field for WSPR.
; Your amateur radio callsign.
; Supports standard (Type 1), compound (Type 2), and extended (Type 3) formats.
; Examples:
;   AA0NT
;   AA0NT/12
;   <AA0NT>
Call Sign = NXXX

; Grid Square:
; Legacy compatibility field for WSPR.
; Your Maidenhead grid locator.
; 4-character (e.g., EM18) for standard transmissions.
; 6-character (e.g., EM18IG) enables extended/paired transmissions.
Grid Square = ZZ99

; TX Power:
; Legacy compatibility field for WSPR.
; Transmitter power in dBm (integer, e.g., 20).
TX Power = 20

; Frequency:
; Legacy compatibility field for WSPR.
; Transmission band (e.g., 20m) or frequency in Hz (e.g., 14097100).
Frequency = 20m

; Transmit Pin:
; BCM GPIO used for RF output.
; GPCLK0 is supported on BCM GPIO 4 or 20.
Transmit Pin = 4


[Meta]
; Mode:
; Active transmit mode.
; Valid values:
;   WSPR
;   QRSS
;   FSKCW
;   DFCW
Mode = WSPR

; Planner Preference:
; Controls how WsprryPi selects between single-frame and paired WSPR transmissions.
;
; auto:
;   Use single-frame when possible and automatically upgrade to paired when required.
;
; prefer_paired:
;   Prefer paired (Type 2 + Type 3) transmissions when supported.
;
; require_paired:
;   Require paired transmissions. Configurations that cannot be paired will be rejected.
Planner Preference = auto


[Extended]
; PPM:
; Frequency offset in parts per million (floating-point).
PPM = 0.0

; Use NTP:
; Calibrate frequency using system time synchronization.
Use NTP = True

; Offset:
; Enable frequency offset correction.
Offset = True

; Use LED:
; Enable status LED output.
Use LED = False

; LED Pin:
; BCM GPIO used for LED (e.g., GPIO18 = 18).
LED Pin = 18

; Power Level:
; Output power level.
; Raspberry Pi GPIO/clock backend currently uses 0 to 7, where 7 is maximum.
Power Level = 7

; Frequency Control GPIO Polarity:
; False = active low
; True  = active high
Frequency Control GPIO Polarity = False

; WSPR Audio Offset Hz:
; Audio-style offset added to the WSPR dial frequency to derive actual RF frequency.
WSPR Audio Offset Hz = 1500.0


[Modulation]
; Dot Seconds:
; Shared default dot length for QRSS, FSKCW, and DFCW UI/config use.
; Current per-mode sections still carry their own dot fields and remain authoritative
; until mode-field consolidation is completed.
Dot Seconds = 3.0

; FSK Offset Hz:
; Shared default FSK offset for FSKCW and DFCW UI/config use.
; Current per-mode sections still carry explicit frequency fields and remain
; authoritative until offset-derived frequency generation is implemented.
FSK Offset Hz = 500.0


[Schedule]
; Start Minute:
; Minute after the top of the hour for scheduled non-WSPR launches.
; Valid range: 0 to 59
Start Minute = 0

; Repeat Minutes:
; Repeat interval in minutes for scheduled non-WSPR launches.
; Must be greater than 0
Repeat Minutes = 10


[WSPR]
; Call Sign:
; Canonical WSPR callsign field.
Call Sign = NXXX

; Grid Square:
; Canonical WSPR grid locator field.
Grid Square = ZZ99

; TX Power:
; Canonical WSPR transmit power in dBm.
TX Power = 20

; Frequency:
; Canonical WSPR dial-frequency set.
; May be a band name such as 20m or a frequency in Hz.
Frequency = 20m

; Audio Offset Hz:
; Offset added to dial frequency to derive RF frequency.
Audio Offset Hz = 1500.0

; Planner Preference:
; WSPR planning preference.
; Valid values:
;   auto
;   prefer_paired
;   require_paired
Planner Preference = auto


[QRSS]
; Message:
; Text to transmit in QRSS mode.
Message =

; Frequency:
; Absolute RF frequency in Hz for QRSS.
Frequency = 3572000.0

; Dot Seconds:
; Dot length in seconds for QRSS.
Dot Seconds = 3.0


[FSKCW]
; Message:
; Text to transmit in FSKCW mode.
Message =

; Mark Frequency:
; Absolute RF mark frequency in Hz.
Mark Frequency = 3571810.0

; Space Frequency:
; Absolute RF space frequency in Hz.
Space Frequency = 3571500.0

; Dot Seconds:
; Dot length in seconds for FSKCW timing.
Dot Seconds = 1.0


[DFCW]
; Message:
; Text to transmit in DFCW mode.
Message =

; Dot Frequency:
; Absolute RF frequency in Hz used for dots.
Dot Frequency = 3572000.0

; Dash Frequency:
; Absolute RF frequency in Hz used for dashes.
Dash Frequency = 3571500.0

; Dot Seconds:
; Base dot time in seconds.
; In DFCW, dots and dashes are distinguished by frequency, not by duration.
Dot Seconds = 3.0


[Server]
; Web Port:
; Port used for REST interface.
Web Port = 31415

; Socket Port:
; Port used for WebSocket interface.
Socket Port = 31416

; Use Shutdown:
; Enable shutdown button monitoring.
Use Shutdown = False

; Shutdown Button:
; BCM GPIO used for shutdown trigger.
Shutdown Button = 19


