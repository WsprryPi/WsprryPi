[Control]
; Transmit:
; Set to True to enable transmitting, False to disable.
Transmit = False


[Common]
; Call Sign:
; Your amateur radio callsign.
; Supports standard (Type 1), compound (Type 2), and extended (Type 3) formats.
; Examples:
;   AA0NT
;   AA0NT/12
;   <AA0NT>
Call Sign = NXXX

; Grid Square:
; Your Maidenhead grid locator.
; 4-character (e.g., EM18) for standard transmissions.
; 6-character (e.g., EM18IG) enables extended/paired transmissions.
Grid Square = ZZ99

; TX Power:
; Transmitter power in dBm (integer, e.g., 20).
TX Power = 20

; Frequency:
; Transmission band (e.g., '20m') or frequency in Hz (e.g., '14097100').
Frequency = 20m

; Transmit Pin:
; BCM GPIO used for WSPR output.
; GPCLK0 is supported on BCM GPIO 4 or 20.
Transmit Pin = 4


[Meta]
; Planner Preference:
; Controls how WsprryPi selects between single-frame and paired transmissions.
;
; auto:
;   Use single-frame when possible and automatically upgrade to paired when required.
;
; prefer_paired:
;   Prefer paired (Type 2 + Type 3) transmissions when supported.
;
; require_paired:
;   Require paired transmissions. Configurations that cannot be paired will be rejected.
Planner Preference = auto


[Extended]
; PPM:
; Frequency offset in parts per million (floating-point).
PPM = 0.0

; Use NTP:
; Calibrate frequency using system time synchronization.
Use NTP = True

; Offset:
; Enable frequency offset correction.
Offset = True

; Use LED:
; Enable status LED output.
Use LED = False

; LED Pin:
; BCM GPIO used for LED (e.g., GPIO18 = 18).
LED Pin = 18

; Power Level:
; Output power level (0 to 7, where 7 is maximum).
Power Level = 7


[Server]
; Web Port:
; Port used for REST interface.
Web Port = 31415

; Socket Port:
; Port used for WebSocket interface.
Socket Port = 31416

; Use Shutdown:
; Enable shutdown button monitoring.
Use Shutdown = False

; Shutdown Button:
; BCM GPIO used for shutdown trigger.
Shutdown Button = 19


